name: Test Puppeteer on Tencent News

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install puppeteer@21.0.0
      - run: node test-qq-news.js
        timeout-minutes: 3
